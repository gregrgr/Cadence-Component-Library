services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cadencecomponentlibraryadmin-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "14333:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -C -Q \"SELECT 1\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 35s

  web:
    build:
      context: .
      dockerfile: src/CadenceComponentLibraryAdmin.Web/Dockerfile
    container_name: cadencecomponentlibraryadmin-web
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ASPNETCORE_HTTP_PORTS: "${ASPNETCORE_HTTP_PORTS:-8080}"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=${DB_NAME:-CadenceComponentLibrary};User ID=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False;"
      FileStorage__AppDataRoot: "/app-data"
      FileStorage__LibraryRoot: "/library"
      FileStorage__LogRoot: "/logs"
      ExternalImports__EasyEdaApiKey: "${EASYEDA_IMPORT_API_KEY:-change-me}"
      ExternalImports__StorageRoot: "/app-data/ExternalImports"
      AiExtraction__Mode: "${AI_EXTRACTION_MODE:-Stub}"
      AiExtraction__CodexCli__Enabled: "${AI_CODEXCLI_ENABLED:-false}"
      AiExtraction__CodexCli__Transport: "${AI_CODEXCLI_TRANSPORT:-HttpBridge}"
      AiExtraction__CodexCli__Command: "${AI_CODEXCLI_COMMAND:-codex}"
      AiExtraction__CodexCli__Model: "${AI_CODEXCLI_MODEL:-}"
      AiExtraction__CodexCli__Profile: "${AI_CODEXCLI_PROFILE:-}"
      AiExtraction__CodexCli__Sandbox: "${AI_CODEXCLI_SANDBOX:-read-only}"
      AiExtraction__CodexCli__Ephemeral: "${AI_CODEXCLI_EPHEMERAL:-true}"
      AiExtraction__CodexCli__TimeoutSeconds: "${AI_CODEXCLI_TIMEOUT_SECONDS:-180}"
      AiExtraction__CodexCli__WorkingDirectory: "${AI_CODEXCLI_WORKING_DIRECTORY:-}"
      AiExtraction__CodexCli__BridgeUrl: "${AI_CODEXCLI_BRIDGE_URL:-http://codex-cli:4517}"
      AiExtraction__CodexCli__PublicBridgeUrl: "${AI_CODEXCLI_PUBLIC_BRIDGE_URL:-http://localhost:4517}"
      AiExtraction__CodexCli__BridgeToken: "${AI_CODEXCLI_BRIDGE_TOKEN:-}"
    ports:
      - "8080:8080"
    volumes:
      - ./storage/app-data:/app-data
      - ./library:/library
      - ./storage/logs:/logs

  codex-cli:
    build:
      context: .
      dockerfile: docker/codex-cli-bridge/Dockerfile
    container_name: cadencecomponentlibraryadmin-codex-cli
    environment:
      CODEX_HOME: "/codex-home"
      CODEX_BRIDGE_TOKEN: "${AI_CODEXCLI_BRIDGE_TOKEN:-}"
      CODEX_COMMAND: "${AI_CODEXCLI_COMMAND:-codex}"
    ports:
      - "127.0.0.1:4517:4517"
    volumes:
      - codex-cli-home:/codex-home
      - ./:/workspace:ro
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4517/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  sqlserver-data:
  codex-cli-home:

